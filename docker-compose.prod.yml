services:
  db:
    image: postgres:15-alpine
    container_name: safeguardpro-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-safeguardpro}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - safeguard-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: safeguardpro-backend
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-safeguardpro}
      PORT: 7000
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER}
    depends_on:
      - db
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/backups:/app/backups
      - ./CERTIFICADOS MODELOS:/app/import_source
    networks:
      - safeguard-net
    ports:
      - "7000:7000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: safeguardpro-frontend
    restart: always
    ports:
      - "6001:6001"
    environment:
      - VITE_API_TARGET=http://backend:7000
      - VITE_API_URL=http://localhost:7000
    depends_on:
      - backend
    networks:
      - safeguard-net

networks:
  safeguard-net:
    driver: bridge

volumes:
  db_data:
